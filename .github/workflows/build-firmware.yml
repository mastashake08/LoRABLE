name: Build Firmware

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.0.0, v2.1.3, etc.

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio
      
      - name: Build firmware
        run: pio run
      
      - name: Prepare firmware artifacts
        run: |
          mkdir -p firmware
          cp .pio/build/heltec_wifi_lora_32_V3/firmware.bin firmware/lorable-${{ github.ref_name }}.bin
          cp .pio/build/heltec_wifi_lora_32_V3/firmware.elf firmware/lorable-${{ github.ref_name }}.elf
          
          # Create checksums
          cd firmware
          sha256sum *.bin > checksums.txt
          cd ..
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            firmware/lorable-${{ github.ref_name }}.bin
            firmware/lorable-${{ github.ref_name }}.elf
            firmware/checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.ref_name }}
          path: firmware/
          retention-days: 30
